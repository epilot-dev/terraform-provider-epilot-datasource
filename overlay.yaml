overlay: 1.0.0
info:
  title: Overlay epilot schema to make a schema resource
  version: 0.0.1
actions:
  - target: $
    update:
      x-speakeasy-retries:
        strategy: backoff
        backoff:
          initialInterval: 5000 # 5 seconds
          maxInterval: 60000 # 60 seconds
          maxElapsedTime: 3600000 # 5 minutes
          exponent: 1.5
        statusCodes:
          - 5XX
        retryConnectionErrors: true
  # Environment Variables
  - target: $["paths"]["/v1/journey/datasources/{compositeId}"]["get"]
    update:
      x-speakeasy-entity-operation: Datasource#get
  - target: $["paths"]["/v1/journey/datasource"]["post"]
    update:
      x-speakeasy-entity-operation: Datasource#create,update


  # delete is not needed for now
  # - target: $["paths"]["/v1/journey/{journeyId}/datasources/{datasourceId}"]["delete"]
  #   update:
  #     x-speakeasy-entity-operation: Datasource#delete

  - target: $["components"]["schemas"]["Datasource"]
    update:
      x-speakeasy-entity: Datasource
